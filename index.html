<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator CRUD Application</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1><i class="fas fa-calculator"></i> Calculator CRUD</h1>
            <p>Perform calculations and manage calculation history</p>
        </header>

        <main class="main-content">
            <div class="calculator-section">
                <div class="calculator-container">
                    <div class="calculator-display">
                        <div class="calculation-display" id="calculationDisplay">0</div>
                        <div class="result-display" id="resultDisplay">0</div>
                    </div>
                    
                    <div class="calculator-buttons">
                        <div class="button-row">
                            <button class="btn btn-function" data-action="clear">C</button>
                            <button class="btn btn-function" data-action="backspace"><i class="fas fa-backspace"></i></button>
                            <button class="btn btn-function" data-action="percentage">%</button>
                            <button class="btn btn-operator" data-action="divide">÷</button>
                        </div>
                        <div class="button-row">
                            <button class="btn btn-number" data-number="7">7</button>
                            <button class="btn btn-number" data-number="8">8</button>
                            <button class="btn btn-number" data-number="9">9</button>
                            <button class="btn btn-operator" data-action="multiply">×</button>
                        </div>
                        <div class="button-row">
                            <button class="btn btn-number" data-number="4">4</button>
                            <button class="btn btn-number" data-number="5">5</button>
                            <button class="btn btn-number" data-number="6">6</button>
                            <button class="btn btn-operator" data-action="subtract">−</button>
                        </div>
                        <div class="button-row">
                            <button class="btn btn-number" data-number="1">1</button>
                            <button class="btn btn-number" data-number="2">2</button>
                            <button class="btn btn-number" data-number="3">3</button>
                            <button class="btn btn-operator" data-action="add">+</button>
                        </div>
                        <div class="button-row">
                            <button class="btn btn-number" data-number="0">0</button>
                            <button class="btn btn-number" data-action="decimal">.</button>
                            <button class="btn btn-equals" data-action="equals">=</button>
                        </div>
                    </div>

                    <div class="calculator-actions">
                        <button class="btn btn-save" id="saveCalculation">
                            <i class="fas fa-save"></i> Save Calculation
                        </button>
                        <button class="btn btn-history" id="showHistory">
                            <i class="fas fa-history"></i> View History
                        </button>
                    </div>
                </div>
            </div>

            <div class="history-section">
                <div class="section-header">
                    <h2><i class="fas fa-history"></i> Calculation History</h2>
                    <div class="section-controls">
                        <button class="btn btn-refresh" id="refreshHistory">
                            <i class="fas fa-sync-alt"></i> Refresh
                        </button>
                        <button class="btn btn-clear-all" id="clearAllHistory">
                            <i class="fas fa-trash"></i> Clear All
                        </button>
                    </div>
                </div>

                <div class="loading-state" id="loadingState">
                    <div class="spinner"></div>
                    <p>Loading history...</p>
                </div>

                <div class="error-state" id="errorState">
                    <i class="fas fa-exclamation-triangle"></i>
                    <p id="errorMessage">Error loading history</p>
                    <button class="btn btn-retry" id="retryButton">Retry</button>
                </div>

                <div class="empty-state" id="emptyState">
                    <i class="fas fa-calculator"></i>
                    <p>No calculations saved yet</p>
                    <p class="subtext">Perform calculations and save them to see them here</p>
                </div>

                <div class="history-list" id="historyList">
                    <!-- History items will be dynamically inserted here -->
                </div>

                <div class="pagination" id="pagination">
                    <!-- Pagination controls will be dynamically inserted here -->
                </div>
            </div>
        </main>

        <!-- Modal for editing calculation -->
        <div class="modal" id="editModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Edit Calculation</h3>
                    <button class="btn btn-close" id="closeModal">&times;</button>
                </div>
                <div class="modal-body">
                    <form id="editForm">
                        <div class="form-group">
                            <label for="editExpression">Expression</label>
                            <input type="text" id="editExpression" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label for="editResult">Result</label>
                            <input type="text" id="editResult" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label for="editDescription">Description (Optional)</label>
                            <textarea id="editDescription" class="form-control" rows="3"></textarea>
                        </div>
                        <div class="form-actions">
                            <button type="button" class="btn btn-cancel" id="cancelEdit">Cancel</button>
                            <button type="submit" class="btn btn-save">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Toast notifications -->
        <div class="toast-container" id="toastContainer"></div>
    </div>

    <script src="api-client.js"></script>
    <script src="app.js"></script>
</body>
</html>
