name: calc_multiverse
description: Calculadora fullstack Next.js — setup + contrato + backend + frontend + testes + síntese + escrita em disco
spec: calc_contract

universes:
  # u_setup e u_contract rodam em PARALELO — sem dependências entre si
  - name: u_setup
    spec: calc_setup
    output_port: result
    output_kind: summary/text

  - name: u_contract
    spec: calc_contract
    output_port: openapi
    output_kind: contract/openapi

  - name: u_backend
    spec: calc_backend
    depends_on: [u_contract]
    input_port: context
    output_port: api_summary
    output_kind: summary/api

  - name: u_frontend
    spec: calc_frontend
    depends_on: [u_backend]
    input_port: context
    output_port: page
    output_kind: frontend/page

  - name: u_test
    spec: calc_tester
    depends_on: [u_backend]
    input_port: context
    output_port: routes_tests
    output_kind: backend/route

  - name: u_synth
    spec: calc_synth
    depends_on: [u_contract, u_backend, u_frontend, u_test]
    input_port: context
    output_port: result
    output_kind: plan/summary
    merge_policy: append
    handoff_max_chars: 260

  # u_writer aguarda u_synth (código) E u_setup (configs) antes de escrever tudo
  - name: u_writer
    spec: calc_writer
    depends_on: [u_synth, u_setup]
    input_port: context
    output_port: result
    output_kind: summary/text
    merge_policy: latest
    handoff_max_chars: 300
