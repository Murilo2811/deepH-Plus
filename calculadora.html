<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Web</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #2c3e50, #1a1a2e);
            padding: 20px;
        }

        .calculator {
            width: 320px;
            height: 480px;
            background-color: #1a1a1a;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .display {
            height: 25%;
            background-color: #2d2d2d;
            color: #ffffff;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: flex-end;
            overflow: hidden;
        }

        .previous-operand {
            font-size: 1.2em;
            color: #a6a6a6;
            margin-bottom: 8px;
            min-height: 1.4em;
            text-align: right;
            width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .current-operand {
            font-size: 2.5em;
            text-align: right;
            width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .keypad {
            flex: 1;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: 12px;
        }

        .button {
            border: none;
            border-radius: 50%;
            font-size: 1.5em;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            width: 64px;
            height: 64px;
            justify-self: center;
        }

        .button:hover {
            filter: brightness(120%);
        }

        .button:active {
            transform: scale(0.95);
        }

        .number, .decimal {
            background-color: #666666;
            color: #ffffff;
        }

        .operator {
            background-color: #ff9500;
            color: #ffffff;
        }

        .equals {
            background-color: #ff9500;
            color: #ffffff;
        }

        .clear {
            background-color: #a6a6a6;
            color: #1a1a1a;
        }

        .span-two {
            grid-column: span 2;
            width: calc(128px + 12px);
            border-radius: 32px;
            justify-content: flex-start;
            padding-left: 28px;
        }

        @media (min-width: 768px) {
            .calculator {
                width: 360px;
            }
            .button {
                width: 72px;
                height: 72px;
            }
            .span-two {
                width: calc(144px + 12px);
            }
        }

        @media (min-width: 1024px) {
            .calculator {
                width: 400px;
            }
            .button {
                width: 80px;
                height: 80px;
            }
            .span-two {
                width: calc(160px + 12px);
            }
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="display">
            <div class="previous-operand" id="previous-operand"></div>
            <div class="current-operand" id="current-operand">0</div>
        </div>
        <div class="keypad">
            <button class="button clear span-two" data-action="clear">C</button>
            <button class="button operator" data-action="divide">÷</button>
            <button class="button operator" data-action="multiply">×</button>

            <button class="button number" data-number="7">7</button>
            <button class="button number" data-number="8">8</button>
            <button class="button number" data-number="9">9</button>
            <button class="button operator" data-action="subtract">-</button>

            <button class="button number" data-number="4">4</button>
            <button class="button number" data-number="5">5</button>
            <button class="button number" data-number="6">6</button>
            <button class="button operator" data-action="add">+</button>

            <button class="button number" data-number="1">1</button>
            <button class="button number" data-number="2">2</button>
            <button class="button number" data-number="3">3</button>
            <button class="button equals" data-action="equals" style="grid-row: span 2;">=</button>

            <button class="button number span-two" data-number="0">0</button>
            <button class="button decimal" data-action="decimal">.</button>
        </div>
    </div>

    <script>
        // Estado da calculadora
        const calculatorState = {
            currentValue: '0',
            previousValue: null,
            operation: null,
            waitingForNewValue: false,
            maxDisplayLength: 12
        };

        // Elementos DOM
        const currentOperandElement = document.getElementById('current-operand');
        const previousOperandElement = document.getElementById('previous-operand');
        const keypadElement = document.querySelector('.keypad');

        // Atualiza o display
        function updateDisplay() {
            let displayValue = calculatorState.currentValue;
            if (displayValue.length > calculatorState.maxDisplayLength) {
                displayValue = displayValue.substring(0, calculatorState.maxDisplayLength);
            }
            currentOperandElement.textContent = displayValue;

            if (calculatorState.previousValue !== null && calculatorState.operation !== null) {
                previousOperandElement.textContent = `${calculatorState.previousValue} ${calculatorState.operation}`;
            } else {
                previousOperandElement.textContent = '';
            }
        }

        // Adiciona um dígito ao valor atual
        function inputDigit(digit) {
            const { currentValue, waitingForNewValue } = calculatorState;

            if (waitingForNewValue) {
                calculatorState.currentValue = digit;
                calculatorState.waitingForNewValue = false;
            } else {
                calculatorState.currentValue = currentValue === '0' ? digit : currentValue + digit;
            }
        }

        // Adiciona ponto decimal
        function inputDecimal() {
            if (calculatorState.waitingForNewValue) {
                calculatorState.currentValue = '0.';
                calculatorState.waitingForNewValue = false;
                return;
            }

            if (!calculatorState.currentValue.includes('.')) {
                calculatorState.currentValue += '.';
            }
        }

        // Define a operação
        function setOperation(nextOperation) {
            const { currentValue, previousValue, operation } = calculatorState;

            if (calculatorState.waitingForNewValue && operation !== null) {
                calculatorState.operation = nextOperation;
                updateDisplay();
                return;
            }

            if (previousValue === null) {
                calculatorState.previousValue = currentValue;
            } else if (operation !== null) {
                compute();
            }

            calculatorState.waitingForNewValue = true;
            calculatorState.operation = nextOperation;
        }

        // Executa o cálculo
        function compute() {
            const { previousValue, currentValue, operation } = calculatorState;

            if (previousValue === null || operation === null) {
                return;
            }

            const prev = parseFloat(previousValue);
            const current = parseFloat(currentValue);
            let result;

            switch (operation) {
                case '+':
                    result = prev + current;
                    break;
                case '-':
                    result = prev - current;
                    break;
                case '×':
                    result = prev * current;
                    break;
                case '÷':
                    if (current === 0) {
                        result = 'Erro';
                    } else {
                        result = prev / current;
                    }
                    break;
                default:
                    return;
            }

            // Formata o resultado
            if (result === 'Erro') {
                calculatorState.currentValue = result;
            } else {
                // Converte para string e limita casas decimais
                let resultString = result.toString();
                if (resultString.includes('.')) {
                    const integerPart = resultString.split('.')[0];
                    const decimalPart = resultString.split('.')[1];
                    if (integerPart.length > calculatorState.maxDisplayLength - 2) {
                        resultString = parseFloat(result.toPrecision(calculatorState.maxDisplayLength - 2)).toString();
                    } else if (resultString.length > calculatorState.maxDisplayLength) {
                        const maxDecimalLength = calculatorState.maxDisplayLength - integerPart.length - 1;
                        resultString = result.toFixed(Math.max(0, maxDecimalLength));
                    }
                }
                calculatorState.currentValue = resultString;
            }

            calculatorState.previousValue = null;
            calculatorState.operation = null;
            calculatorState.waitingForNewValue = true;
        }

        // Limpa a calculadora
        function clearCalculator() {
            calculatorState.currentValue = '0';
            calculatorState.previousValue = null;
            calculatorState.operation = null;
            calculatorState.waitingForNewValue = false;
        }

        // Manipula cliques nos botões
        function handleButtonClick(event) {
            const button = event.target;
            if (!button.classList.contains('button')) return;

            const action = button.dataset.action;
            const number = button.dataset.number;

            if (number !== undefined) {
                if (calculatorState.currentValue === 'Erro') {
                    clearCalculator();
                }
                inputDigit(number);
            } else if (action === 'decimal') {
                if (calculatorState.currentValue === 'Erro') {
                    clearCalculator();
                }
                inputDecimal();
            } else if (action === 'clear') {
                clearCalculator();
            } else if (action === 'equals') {
                if (calculatorState.currentValue === 'Erro') {
                    clearCalculator();
                } else {
                    compute();
                }
            } else if (['add', 'subtract', 'multiply', 'divide'].includes(action)) {
                if (calculatorState.currentValue === 'Erro') {
                    clearCalculator();
                }
                const operationMap = {
                    'add': '+',
                    'subtract': '-',
                    'multiply': '×',
                    'divide': '÷'
                };
                setOperation(operationMap[action]);
            }

            updateDisplay();
        }

        // Inicialização
        keypadElement.addEventListener('click', handleButtonClick);
        updateDisplay();
    </script>
</body>
</html>
