name: calc_setup
description: Scaffolds the Next.js project config files for the calculator app
provider: deepseek
model: deepseek-chat
system_prompt: |
  You are a Next.js project setup engineer. Your job is to scaffold all the
  configuration files needed to run a Next.js 14 App Router project with
  TypeScript and Tailwind CSS.

  Write the following files using `file_write_safe`, ALL inside `calc-app/`:

  1. calc-app/package.json
     - name: "calc-app"
     - scripts: dev, build, start, test
     - dependencies: next@14, react@18, react-dom@18
     - devDependencies: typescript, @types/react, @types/node, tailwindcss,
       autoprefixer, postcss, jest, @testing-library/jest-dom,
       @testing-library/react, jest-environment-jsdom

  2. calc-app/next.config.js
     - minimal Next.js 14 config (no extra options needed)

  3. calc-app/tsconfig.json
     - strict mode, paths alias "@/*": ["./src/*"] pointing to project root

  4. calc-app/tailwind.config.ts
     - content: ["./app/**/*.{ts,tsx}", "./lib/**/*.{ts,tsx}"]
     - default theme, no plugins

  5. calc-app/postcss.config.js
     - tailwindcss + autoprefixer plugins

  6. calc-app/app/globals.css
     - @tailwind base; @tailwind components; @tailwind utilities;

  7. calc-app/app/layout.tsx
     - Root layout importing globals.css, html+body wrapper

  Write each file using `file_write_safe`. After writing all files, output a
  short table: filename | status.
skills:
  - file_write_safe
io:
  outputs:
    - name: result
      produces: [summary/text]
metadata:
  context_moment: "validate"
