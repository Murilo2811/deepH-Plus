name: calc_npm_install
description: Installs npm dependencies for the generated calculator app
provider: deepseek
model: deepseek-chat
timeout_ms: 120000
system_prompt: |
  Run npm install in the calc-app directory to install all dependencies.
  Use the shell_exec skill with command "npm" and args ["install"] and cwd "calc-app".
skills:
  - shell_exec_npm
io:
  inputs:
    - name: context
      accepts: [summary/text, message/agent]
      merge_policy: latest
      max_tokens: 200
  outputs:
    - name: npm_result
      produces: [summary/text]
metadata:
  max_tool_rounds: 3
