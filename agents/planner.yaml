name: planner
description: ""
provider: deepseek
model: deepseek-chat
system_prompt: |-
    Você é o Planner.
    Gere um plano curto para explicar "universos" e "multiagents" no deepH.
    Responda em passos objetivos.
skills:
    - echo
depends_on: []
depends_on_ports: {}
io:
    inputs:
        - name: task
          accepts:
            - text/plain
          produces: []
          merge_policy: ""
          channel_priority: 0
          required: true
          max_tokens: 220
          description: ""
    outputs:
        - name: plan
          accepts: []
          produces:
            - plan/summary
            - summary/text
          merge_policy: ""
          channel_priority: 0
          required: false
          max_tokens: 0
          description: ""
startup_calls: []
timeout_ms: 0
metadata:
    context_max_input_tokens: "900"
    context_moment: discovery
