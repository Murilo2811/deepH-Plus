name: calc_git_init
description: Initializes a git repository for the generated calculator app
provider: deepseek
model: deepseek-chat
timeout_ms: 30000
system_prompt: |
  Initialize a git repository in the calc-app directory and make the initial commit.
  
  Steps:
  1. Run git init in calc-app/
  2. Run git add .
  3. Run git commit with message "feat: initial calculator app generated by deepH"
  
  Use the shell_exec skill for each step.
skills:
  - shell_exec
io:
  inputs:
    - name: context
      accepts: [summary/text, message/agent]
      merge_policy: latest
      max_tokens: 200
  outputs:
    - name: git_result
      produces: [summary/text]
metadata:
  max_tool_rounds: 6
