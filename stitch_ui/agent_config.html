<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Agent Configuration Panel</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#10b77f",
                        "background-light": "#f6f8f7",
                        "background-dark": "#10221c",
                        "slate-panel": "#152a24",
                        "border-accent": "#326755",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #10221c;
        }
        .glass-card {
            background: rgba(21, 42, 36, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(16, 183, 127, 0.1);
        }
        .skill-checkbox:checked + label {
            background-color: rgba(16, 183, 127, 0.2);
            border-color: #10b77f;
            box-shadow: 0 0 15px rgba(16, 183, 127, 0.3);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex h-auto min-h-screen w-full flex-col overflow-x-hidden">
<header class="flex items-center bg-background-light dark:bg-background-dark p-4 sticky top-0 z-50 border-b border-border-accent/30">
<div class="text-primary flex size-10 shrink-0 items-center justify-center cursor-pointer">
<span class="material-symbols-outlined">arrow_back</span>
</div>
<h1 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-10">Configuration Panel</h1>
</header>
<main class="flex-1 w-full max-w-2xl mx-auto pb-24">
<section class="px-4 pt-6">
<div class="flex items-center gap-2 mb-4">
<span class="material-symbols-outlined text-primary text-sm">settings_suggest</span>
<h2 class="text-slate-900 dark:text-slate-100 text-xl font-bold tracking-tight">General Information</h2>
</div>
<div class="space-y-4">
<label class="flex flex-col w-full">
<p class="text-slate-700 dark:text-slate-300 text-sm font-medium pb-1.5 px-1">Agent Name</p>
<input class="form-input flex w-full rounded border-border-accent bg-slate-panel focus:ring-1 focus:ring-primary focus:border-primary text-slate-100 h-12 px-4 placeholder:text-slate-500" placeholder="e.g. Research Assistant" type="text" value="DevAgent-01"/>
</label>
<label class="flex flex-col w-full">
<p class="text-slate-700 dark:text-slate-300 text-sm font-medium pb-1.5 px-1">Description</p>
<input class="form-input flex w-full rounded border-border-accent bg-slate-panel focus:ring-1 focus:ring-primary focus:border-primary text-slate-100 h-12 px-4 placeholder:text-slate-500" placeholder="Short description of the agent's purpose" type="text"/>
</label>
</div>
</section>
<section class="px-4 pt-8">
<div class="flex items-center gap-2 mb-4">
<span class="material-symbols-outlined text-primary text-sm">terminal</span>
<h2 class="text-slate-900 dark:text-slate-100 text-xl font-bold tracking-tight">System Prompt</h2>
</div>
<label class="flex flex-col w-full">
<textarea class="form-input flex w-full min-h-[180px] rounded border-border-accent bg-slate-panel focus:ring-1 focus:ring-primary focus:border-primary text-slate-100 p-4 font-mono text-sm leading-relaxed" placeholder="Enter core instructions for the AI behavior..."></textarea>
</label>
</section>
<section class="px-4 pt-8 grid grid-cols-2 gap-4">
<label class="flex flex-col">
<p class="text-slate-700 dark:text-slate-300 text-sm font-medium pb-1.5 px-1">Provider</p>
<div class="relative">
<select class="form-select w-full rounded border-border-accent bg-slate-panel focus:ring-1 focus:ring-primary focus:border-primary text-slate-100 h-12 px-4 appearance-none">
<option>DeepSeek</option>
<option selected="">OpenAI</option>
<option>Anthropic</option>
<option>Local (Ollama)</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-3 pointer-events-none text-slate-400">expand_more</span>
</div>
</label>
<label class="flex flex-col">
<p class="text-slate-700 dark:text-slate-300 text-sm font-medium pb-1.5 px-1">Model</p>
<div class="relative">
<select class="form-select w-full rounded border-border-accent bg-slate-panel focus:ring-1 focus:ring-primary focus:border-primary text-slate-100 h-12 px-4 appearance-none">
<option>gpt-4o</option>
<option>gpt-4-turbo</option>
<option>gpt-3.5-turbo</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-3 pointer-events-none text-slate-400">expand_more</span>
</div>
</label>
</section>
<section class="px-4 pt-8">
<div class="flex items-center gap-2 mb-4">
<span class="material-symbols-outlined text-primary text-sm">extension</span>
<h2 class="text-slate-900 dark:text-slate-100 text-xl font-bold tracking-tight">Skills &amp; Capabilities</h2>
</div>
<div class="grid grid-cols-2 gap-3">
<div class="relative">
<input checked="" class="skill-checkbox hidden" id="skill-web" type="checkbox"/>
<label class="flex items-center gap-3 p-3 rounded border border-border-accent/50 bg-slate-panel/40 cursor-pointer transition-all duration-200" for="skill-web">
<span class="material-symbols-outlined text-primary">language</span>
<span class="text-sm font-medium">Web Search</span>
</label>
</div>
<div class="relative">
<input checked="" class="skill-checkbox hidden" id="skill-code" type="checkbox"/>
<label class="flex items-center gap-3 p-3 rounded border border-border-accent/50 bg-slate-panel/40 cursor-pointer transition-all duration-200" for="skill-code">
<span class="material-symbols-outlined text-primary">code</span>
<span class="text-sm font-medium">Code Intrep.</span>
</label>
</div>
<div class="relative">
<input class="skill-checkbox hidden" id="skill-vision" type="checkbox"/>
<label class="flex items-center gap-3 p-3 rounded border border-border-accent/50 bg-slate-panel/40 cursor-pointer transition-all duration-200" for="skill-vision">
<span class="material-symbols-outlined text-slate-400">visibility</span>
<span class="text-sm font-medium">Vision</span>
</label>
</div>
<div class="relative">
<input class="skill-checkbox hidden" id="skill-memory" type="checkbox"/>
<label class="flex items-center gap-3 p-3 rounded border border-border-accent/50 bg-slate-panel/40 cursor-pointer transition-all duration-200" for="skill-memory">
<span class="material-symbols-outlined text-slate-400">memory</span>
<span class="text-sm font-medium">Long Memory</span>
</label>
</div>
</div>
</section>
</main>
<footer class="fixed bottom-0 left-0 right-0 p-4 glass-card border-t border-border-accent/20 flex gap-4">
<button class="flex-1 h-12 rounded border border-border-accent text-slate-300 font-bold hover:bg-slate-panel transition-colors">
                Cancel
            </button>
<button class="flex-[2] h-12 rounded bg-primary text-background-dark font-bold hover:bg-primary/90 transition-colors flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[20px]">save</span>
                Deploy Agent
            </button>
</footer>
</div>
</body></html>
